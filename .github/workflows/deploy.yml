name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build
        env:
          NODE_ENV: production
          DEPLOY: github
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build 2>&1 | tee build.log; echo "EXIT_CODE=${PIPESTATUS[0]}"; cat build.log

      - name: Prepare dist
        run: |
          # Copie 404.html pour SPA routing
          cp dist/index.html dist/404.html
          # Aplatit commands.html
          if [ -f dist/src/commands/commands.html ]; then
            cp dist/src/commands/commands.html dist/commands.html
            rm -rf dist/src
          fi
          # Verifications
          test -f dist/index.html || (echo "Missing index.html" && exit 1)
          test -f dist/commands.html || (echo "Missing commands.html" && exit 1)
          test -f dist/assets/icon-64.png || (echo "Missing icon-64.png" && exit 1)
          echo "Build artifacts ready"
          ls -la dist/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy from ${{ github.sha }}"
